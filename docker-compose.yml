version: '3.8'



services:
  db_server:
    image: "postgres:14.0"
    ports: 
      - "5432:5432"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db-data/xilftren_official_db/:/var/lib/postgresql/data